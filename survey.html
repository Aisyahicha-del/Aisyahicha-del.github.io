<html>
<head>
    <title>Survey Kepuasan Pelanggan</title>
</head>

<body>

<h2 align="center">Survey Kepuasan Pelanggan</h2>

<form action="" method="post" name="formSurvey">

<table border="1" cellpadding="10" align="center" width="50%">

    <!-- Data Pelanggan -->
    <tr bgcolor="lightblue">
        <th colspan="2">Data Pelanggan</th>
    </tr>
    <tr>
        <td>Nama</td>
        <td><input type="text" name="nama" size="30"></td>
    </tr>
    <tr>
        <td>Alamat</td>
        <td><input type="text" name="alamat" size="40"></td>
    </tr>
    <tr>
        <td>No. Telepon</td>
        <td><input type="text" name="telp" size="20"></td>
    </tr>

    <!-- Dropdown -->
    <tr bgcolor="lightblue">
        <th colspan="2">Kategori Pelanggan</th>
    </tr>
    <tr>
        <td>Kategori</td>
        <td>
            <select name="kategori">
                <option value="pelajar">Pelajar</option>
                <option value="mahasiswa">Mahasiswa</option>
                <option value="karyawan">Karyawan</option>
                <option value="lainnya">Lainnya</option>
            </select>
        </td>
    </tr>

    <!-- Checkbox -->
    <tr bgcolor="lightblue">
        <th colspan="2">Produk yang Disukai</th>
    </tr>
    <tr>
        <td>Pilih Produk</td>
        <td>
            <input type="checkbox" name="produk" value="A"> Produk A <br>
            <input type="checkbox" name="produk" value="B"> Produk B <br>
            <input type="checkbox" name="produk" value="C"> Produk C <br>
            <input type="checkbox" name="produk" value="D"> Produk D
        </td>
    </tr>

    <!-- Radio Button -->
    <tr bgcolor="lightblue">
        <th colspan="2">Tingkat Kepuasan</th>
    </tr>
    <tr>
        <td>Kepuasan</td>
        <td>
            <input type="radio" name="kepuasan" value="sangat_puas"> Sangat Puas <br>
            <input type="radio" name="kepuasan" value="puas"> Puas <br>
            <input type="radio" name="kepuasan" value="cukup"> Cukup <br>
            <input type="radio" name="kepuasan" value="tidak_puas"> Tidak Puas
        </td>
    </tr>

    <!-- Text Area -->
    <tr bgcolor="lightblue">
        <th colspan="2">Komentar</th>
    </tr>
    <tr>
        <td>Komentar</td>
        <td>
            <textarea name="komentar" rows="5" cols="40"></textarea>
        </td>
    </tr>

    <!-- Submit & Reset -->
    <tr>
        <td colspan="2" align="center">
            <input type="submit" value="Kirim">
            <input type="reset" value="Reset">
        </td>
    </tr>

</table>

</form>

</body>
</html>
